name: hamada_ai
description: "حماده AI — مساعدك الشخصي الذكي"
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.3.2
  workmanager: ^0.5.2
  flutter_local_notifications: ^17.2.2
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.3
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  shimmer: ^3.0.0
  go_router: ^14.2.7
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  package_info_plus: ^8.0.2
  intl: ^0.19.0
  uuid: ^4.4.2
  logger: ^2.4.0
  collection: ^1.18.0
  speech_to_text: ^6.6.0
  archive: ^3.5.1
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  connectivity_plus: ^6.0.3
  local_auth: ^2.3.0
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
  assets:
    - assets/prompts/
    - assets/animations/
    - assets/icons/
    - assets/images/
